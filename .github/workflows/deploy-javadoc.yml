name: Deploy Javadoc

on: [ workflow_dispatch, workflow_call ]

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          check-latest: true
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build with Gradle
        run: ./gradlew :javadoc:javadoc --stacktrace
      - name: Move files
        run: |
          mv ./javadoc/build/docs/javadoc ./docs
      - name: Create CNAME
        run: |
          echo "jd.soulfiremc.com" > ./docs/CNAME

      - name: 'Push changes'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # 7.1.0
        with:
          commit_message: 'Deploy SoulFire Javadoc'
          branch: 'gh-pages'
          create_branch: true
          push_options: '--force'
