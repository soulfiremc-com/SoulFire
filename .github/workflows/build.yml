name: Build
on: [ push, pull_request ]

permissions:
  contents: read

jobs:
  build:
    # Only run on PRs if the source branch is on someone else's repo
    if: "${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}"

    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '25'
          distribution: 'temurin'
          check-latest: true
      - name: Execute Gradle Build
        run: ./gradlew build test printSFCLIFlags --stacktrace | grep -q -- "--bot-amount" || exit 1
      - name: Get version
        id: get-version
        run: |
          projectVersion=$(grep '^maven_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$projectVersion" >> $GITHUB_OUTPUT
      - name: Upload Client Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: SoulFireCLI
          if-no-files-found: error
          path: |
            client-launcher/build/libs/SoulFireCLI-${{ steps.get-version.outputs.version }}.jar
      - name: Upload Dedicated Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: SoulFireDedicated
          if-no-files-found: error
          path: |
            dedicated-launcher/build/libs/SoulFireDedicated-${{ steps.get-version.outputs.version }}.jar
